services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.nuxt
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev # <--- Указываем Docker остановиться на этапе 'dev'
    ports:
      - "6080:6080"
    volumes:
      - ./backend:/app
      - cargo_cache:/usr/local/cargo/registry
      - target_cache:/app/target
    environment:
      - RUST_LOG=info
      - RUSTFLAGS=-C link-arg=-fuse-ld=mold
    # Теперь 'cargo' будет найден, так как мы в образе 'dev'
    command: cargo watch -x run 
    restart: unless-stopped

volumes:
  cargo_cache:
  target_cache: